<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B0B1A">
<title>ਪੰਜਾਬੀ ਸਿੱਖੋ</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B0B1A;--bg2:#12122A;--card:#1A1A36;--card2:#222248;--card3:#2A2A52;
  --saf:#F5A623;--grn:#2ECC71;--red:#E74C3C;--blu:#3B82F6;--pur:#8B5CF6;--cyan:#06B6D4;--pink:#EC4899;--warn:#F59E0B;
  --txt:#F8FAFC;--txt2:#CBD5E1;--txt3:#64748B;--brd:#2D2D5A;
  --r:16px;--r2:12px;--r3:20px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:'Inter',sans-serif;cursor:pointer}input,textarea,select{font-family:'Inter',sans-serif}

/* Container */
.app{max-width:480px;margin:0 auto;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(90px,calc(70px + env(safe-area-inset-bottom)))}

/* Typography */
.h1{font-size:22px;font-weight:800;letter-spacing:-0.3px}
.h2{font-size:18px;font-weight:700;letter-spacing:-0.2px}
.h3{font-size:15px;font-weight:700}
.sub{font-size:12px;color:var(--txt3);font-weight:500}
.sub2{font-size:11px;color:var(--txt3)}

/* Header bar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--pur),var(--blu));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.topbar-avatar img{width:100%;height:100%;border-radius:14px;object-fit:cover}
.topbar-info .name{font-size:16px;font-weight:700}
.topbar-info .greeting{font-size:12px;color:var(--txt3)}
.topbar-actions{display:flex;gap:8px}

/* Buttons */
.btn{padding:12px 24px;border:none;border-radius:var(--r2);font-weight:700;font-size:14px;transition:all .15s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--saf);color:#0B0B1A}
.btn-s{background:var(--card2);color:var(--txt)}
.btn-d{background:var(--red);color:#fff}
.btn-g{background:var(--grn);color:#fff}
.btn-w{width:100%}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:10px}
.btn:disabled{opacity:.35;pointer-events:none}
.btn-icon{width:40px;height:40px;border-radius:12px;border:none;background:var(--card2);color:var(--txt);font-size:18px;display:flex;align-items:center;justify-content:center}
.btn-icon:active{transform:scale(.9)}

/* Inputs */
.inp{width:100%;padding:14px 16px;background:var(--card);border:1.5px solid var(--brd);border-radius:var(--r2);color:var(--txt);font-size:14px;font-weight:500;transition:border .2s}
.inp:focus{outline:none;border-color:var(--saf)}
.inp::placeholder{color:var(--txt3)}
.lbl{font-size:11px;font-weight:600;color:var(--txt3);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.8px}
.fld{margin-bottom:14px}
.field-hint{font-size:10px;color:var(--txt3);margin-top:4px;font-style:italic}

/* Dashboard Grid Cards */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.dash-card{border-radius:var(--r3);padding:18px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;min-height:110px;display:flex;flex-direction:column;justify-content:space-between}
.dash-card:active{transform:scale(.97)}
.dash-card .dc-icon{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px}
.dash-card .dc-title{font-size:14px;font-weight:700;color:#fff}
.dash-card .dc-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.dash-card.dc-green{background:linear-gradient(135deg,#2ECC71,#27AE60)}
.dash-card.dc-blue{background:linear-gradient(135deg,#3B82F6,#2563EB)}
.dash-card.dc-purple{background:linear-gradient(135deg,#8B5CF6,#7C3AED)}
.dash-card.dc-orange{background:linear-gradient(135deg,#F59E0B,#D97706)}
.dash-card.dc-pink{background:linear-gradient(135deg,#EC4899,#DB2777)}
.dash-card.dc-cyan{background:linear-gradient(135deg,#06B6D4,#0891B2)}
.dash-card.dc-red{background:linear-gradient(135deg,#EF4444,#DC2626)}
.dash-card.dc-wide{grid-column:span 2}

/* Panel / Card */
.panel{background:var(--card);border-radius:var(--r3);padding:18px;margin-bottom:14px}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.panel-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}

/* Section title */
.sec-title{font-size:14px;font-weight:700;color:var(--txt2);margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* List items */
.list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--brd)}
.list-item:last-child{border-bottom:none}
.list-item.clickable{cursor:pointer}
.list-item.clickable:active{opacity:.7}

/* Avatars */
.avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
.avatar-sm{width:32px;height:32px;border-radius:10px;font-size:13px}
.av-pur{background:linear-gradient(135deg,#8B5CF6,#7C3AED)}
.av-blu{background:linear-gradient(135deg,#3B82F6,#2563EB)}
.av-grn{background:linear-gradient(135deg,#2ECC71,#27AE60)}
.av-org{background:linear-gradient(135deg,#F59E0B,#D97706)}
.av-pink{background:linear-gradient(135deg,#EC4899,#DB2777)}
.av-cyan{background:linear-gradient(135deg,#06B6D4,#0891B2)}
.av-colors{background:linear-gradient(135deg,#8B5CF6,#EC4899)}

/* Category circles */
.cat-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* Chips / Filter tabs */
.chip-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;border:none;background:var(--card2);color:var(--txt3);cursor:pointer;white-space:nowrap;transition:all .15s}
.chip.on{background:var(--saf);color:#0B0B1A}

/* Card grid (flashcards) */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.flash-card{background:var(--card2);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .15s}
.flash-card:active{transform:scale(.97)}
.flash-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.flash-card .fc-label{padding:10px;text-align:center}
.flash-card .fc-gur{font-size:20px;font-weight:800}
.flash-card .fc-eng{font-size:11px;color:var(--txt3);margin-top:2px}

/* Flashcard viewer */
.viewer{background:var(--card);border-radius:var(--r3);overflow:hidden;margin-bottom:14px}
.viewer-img{width:100%;height:220px;object-fit:cover;display:block;background:var(--card2)}
.viewer-body{padding:20px;text-align:center}
.viewer-gur{font-size:36px;font-weight:900;letter-spacing:-0.5px}
.viewer-eng{font-size:15px;color:var(--txt3);margin-top:4px}
.viewer-blur{filter:blur(24px);user-select:none}

/* Audio button */
.audio-btn{width:60px;height:60px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--saf),#F97316);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 4px 20px rgba(245,166,35,.3)}
.audio-btn:active{transform:scale(.92)}

/* Quiz grid */
.quiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.quiz-opt{border-radius:var(--r);overflow:hidden;border:3px solid var(--brd);cursor:pointer;transition:all .2s;aspect-ratio:1}
.quiz-opt:active{transform:scale(.96)}
.quiz-opt.ok{border-color:var(--grn);box-shadow:0 0 24px rgba(46,204,113,.3)}
.quiz-opt.no{border-color:var(--red);box-shadow:0 0 24px rgba(231,76,60,.3)}
.quiz-opt img{width:100%;height:100%;object-fit:cover;display:block}

/* Flash overlay */
.flash-ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;animation:fo .5s ease-out forwards;pointer-events:none}
.flash-ov.ok{background:rgba(46,204,113,.2)}.flash-ov.no{background:rgba(231,76,60,.2)}
.flash-ov span{font-size:72px;animation:fp .3s ease-out}
@keyframes fo{to{opacity:0}}@keyframes fp{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* Messages */
.msg-list{max-height:380px;overflow-y:auto;padding:4px 0}
.msg-bub{max-width:82%;padding:12px 16px;border-radius:18px;margin-bottom:8px;font-size:13px;line-height:1.5}
.msg-sent{background:var(--saf);color:#0B0B1A;margin-left:auto;border-bottom-right-radius:4px}
.msg-recv{background:var(--card2);color:var(--txt);margin-right:auto;border-bottom-left-radius:4px}
.msg-time{font-size:10px;opacity:.5;margin-top:4px}.msg-name{font-size:10px;font-weight:700;color:var(--saf);margin-bottom:2px}
.msg-compose{display:flex;gap:8px;margin-top:14px}

/* Badges */
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.badge{background:var(--card2);border-radius:var(--r2);padding:12px 6px;text-align:center;opacity:.3}
.badge.earned{opacity:1;border:1.5px solid var(--saf)}
.badge .b-ico{font-size:28px}.badge .b-name{font-size:9px;font-weight:600;margin-top:4px;color:var(--txt3)}
.badge.earned .b-name{color:var(--txt)}

/* XP Bar */
.xp-bar{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:14px}
.xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.xp-level{font-size:13px;font-weight:800;color:var(--saf)}.xp-pts{font-size:11px;color:var(--txt3)}
.xp-track{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--saf),var(--pur));border-radius:3px;transition:width .5s}

/* Streak */
.streak{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:var(--r);padding:12px 16px;margin-bottom:14px}
.streak-num{font-size:22px;font-weight:900;color:var(--saf)}.streak-lbl{font-size:11px;color:var(--txt3)}

/* Score bar */
.score-bar{display:flex;gap:10px;margin-bottom:14px}
.score-card{flex:1;background:var(--card);border-radius:var(--r2);padding:12px;text-align:center}
.score-val{font-size:20px;font-weight:800}.score-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;margin-top:2px}

/* Attendance */
.att-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--brd)}
.att-row:last-child{border-bottom:none}
.att-name{flex:1;font-size:14px;font-weight:600}
.att-btn{width:56px;height:38px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.att-btn:active{transform:scale(.88)}
.att-btn.present{background:var(--grn);color:#fff}.att-btn.absent{background:var(--red);color:#fff}.att-btn.unmarked{background:var(--card2);color:var(--txt3)}
.att-stat-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.att-fill{height:100%;border-radius:3px;transition:width .3s}
.att-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.att-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.att-day.p{background:rgba(46,204,113,.2);color:var(--grn)}.att-day.a{background:rgba(231,76,60,.2);color:var(--red)}.att-day.e{background:var(--card2);color:var(--txt3)}

/* Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:700}
.tag-pur{background:rgba(139,92,246,.2);color:var(--pur)}
.tag-grn{background:rgba(46,204,113,.2);color:var(--grn)}
.tag-org{background:rgba(245,158,11,.2);color:var(--warn)}
.tag-red{background:rgba(231,76,60,.2);color:var(--red)}
.pw-tag{font-family:'JetBrains Mono',monospace;background:var(--card2);padding:2px 8px;border-radius:6px;font-size:11px;color:var(--saf)}

/* Help tip */
.help-tip{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:var(--r2);padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--blu);line-height:1.6;display:flex;gap:8px}
.help-tip .h-ico{font-size:16px;flex-shrink:0}

/* Birthday */
.bday{background:linear-gradient(135deg,rgba(236,72,153,.1),rgba(245,158,11,.1));border:1px solid rgba(245,158,11,.3);border-radius:var(--r);padding:14px;margin-bottom:14px}
.bday h4{font-size:14px;color:var(--warn);margin-bottom:6px}
.bday-item{font-size:12px;padding:3px 0;display:flex;align-items:center;gap:6px}

/* Welcome */
.welcome{background:linear-gradient(135deg,rgba(59,130,246,.1),rgba(139,92,246,.1));border:1px solid rgba(59,130,246,.2);border-radius:var(--r);padding:14px;margin-bottom:14px;font-size:13px;line-height:1.5}

/* Word of Day */
.wod-card{background:linear-gradient(135deg,rgba(245,166,35,.08),rgba(139,92,246,.08));border:1.5px solid rgba(245,166,35,.25);border-radius:var(--r3);padding:20px;margin-bottom:14px;text-align:center;cursor:pointer}
.wod-card .wod-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--saf);font-weight:700;margin-bottom:8px}
.wod-card .wod-gur{font-size:38px;font-weight:900}.wod-card .wod-eng{font-size:14px;color:var(--txt3);margin-top:4px}
.wod-card .wod-img{width:120px;height:120px;border-radius:16px;object-fit:cover;margin:12px auto;display:block;border:2px solid rgba(245,166,35,.3)}

/* Game buttons */
.game-btn{border:none;border-radius:var(--r);padding:16px 20px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;width:100%;margin-bottom:10px;color:#fff;transition:all .15s}
.game-btn:active{transform:scale(.97)}
.game-btn .g-sub{font-size:11px;opacity:.7;margin-left:auto}

/* Back button */
.back{background:none;border:none;color:var(--txt3);font-size:14px;font-weight:600;padding:8px 0;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.back:hover{color:var(--txt)}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--brd);padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:50;display:none}
.bnav-inner{max-width:480px;margin:0 auto;display:flex;justify-content:space-around}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:none;color:var(--txt3);font-size:10px;font-weight:600;cursor:pointer;position:relative}
.bnav-item.on{color:var(--saf)}
.bnav-item .ni{font-size:22px}
.bnav-badge{position:absolute;top:-2px;right:2px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* Search */
.search-bar{position:relative;margin-bottom:14px}
.search-bar input{width:100%;padding:12px 16px 12px 42px;background:var(--card);border:1.5px solid var(--brd);border-radius:var(--r2);color:var(--txt);font-size:14px}
.search-bar input:focus{outline:none;border-color:var(--saf)}
.search-bar .s-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--txt3)}

/* Confetti */
.confetti-box{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.confetti-p{position:absolute;width:10px;height:10px;top:-10px;animation:cfall 3s ease-out forwards}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* Lang select */
.lang-sel{background:var(--card2);border:1px solid var(--brd);border-radius:10px;color:var(--txt);padding:6px 10px;font-size:11px;font-weight:600}

/* Loading */
.loader{display:inline-block;width:24px;height:24px;border:3px solid var(--brd);border-top-color:var(--saf);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px}
.loading p{color:var(--txt3);font-size:13px}

/* Empty state */
.empty{text-align:center;padding:32px 20px;color:var(--txt3)}
.empty .e-ico{font-size:40px;margin-bottom:8px}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:14px;font-size:13px;font-weight:700;z-index:200;animation:toastin .3s ease-out;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.toast-ok{background:var(--grn);color:#fff}.toast-err{background:var(--red);color:#fff}
@keyframes toastin{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Extra images */
.extra-imgs{display:flex;gap:8px;justify-content:center;margin-top:10px}
.extra-imgs img{width:70px;height:70px;border-radius:10px;object-fit:cover;border:2px solid rgba(245,166,35,.3)}

/* Utilities */
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-1{flex:1}.text-center{text-align:center}
.mb-8{margin-bottom:8px}.mb-14{margin-bottom:14px}.mt-14{margin-top:14px}
</style>
</head>

function toast(m,ty='ok'){const e=document.createElement('div');e.className='toast toast-'+ty;e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2500)}

function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function fmt(ts){const d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}

function confetti(){const c=document.createElement('div');c.className='confetti-box';const cl=['#F5A623','#2ECC71','#E74C3C','#3B82F6','#8B5CF6'];
  for(let i=0;i<45;i++){const p=document.createElement('div');p.className='confetti-p';p.style.left=Math.random()*100+'%';p.style.background=cl[Math.floor(Math.random()*cl.length)];p.style.animationDelay=Math.random()*2+'s';c.appendChild(p)}

function isBdayToday(d){if(!d)return false;const t=new Date(),x=new Date(d+'T12:00:00');return x.getMonth()===t.getMonth()&&x.getDate()===t.getDate()}
function isBdaySoon(d,days=7){if(!d)return false;const t=new Date();t.setHours(0,0,0,0);for(let i=1;i<=days;i++){const c=new Date(t);c.setDate(c.getDate()+i);const x=new Date(d+'T12:00:00');if(x.getMonth()===c.getMonth()&&x.getDate()===c.getDate())return i}return false}

// XP
const LEVELS=[0,50,120,200,300,450,650,900,1200,1600,2100];
function getLevel(xp){let l=0;for(let i=0;i<LEVELS.length;i++){if(xp>=LEVELS[i])l=i;else break}return l}
function getLN(l){return['Beginner','Starter','Learner','Explorer','Achiever','Scholar','Expert','Master','Legend','Champion','Guru'][l]||'Guru'}
function xpInfo(xp){const l=getLevel(xp);const n=LEVELS[l+1]||LEVELS[LEVELS.length-1];return{level:l,name:getLN(l),needed:n,progress:Math.min(100,((xp-(LEVELS[l]||0))/(n-(LEVELS[l]||0)))*100)}}
async function addXP(sid,a){const d=await db.collection('students').doc(sid).get();const o=d.data().xp||0;const n=o+a;await db.collection('students').doc(sid).update({xp:n});if(getLevel(n)>getLevel(o))confetti();return n}
async function updStreak(sid){const d=await db.collection('students').doc(sid).get();const data=d.data();const today=new Date().toISOString().split('T')[0];
  if(data.lastPracticeDate===today)return data.streak||0;const y=new Date(Date.now()-86400000).toISOString().split('T')[0];
  const ns=data.lastPracticeDate===y?(data.streak||0)+1:1;await db.collection('students').doc(sid).update({streak:ns,lastPracticeDate:today});return ns}

function compImg(f,mx=400,q=0.7){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>h){if(w>mx){h=h*mx/w;w=mx}}else{if(h>mx){w=w*mx/h;h=mx}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);r(c.toDataURL('image/jpeg',q))};img.src=e.target.result};rd.readAsDataURL(f)})}

const BADGES=[{id:'first_quiz',ico:'🌟',name:'First Steps'},{id:'quiz5',ico:'📖',name:'Learner'},{id:'quiz15',ico:'🏆',name:'Master'},{id:'perfect',ico:'🎯',name:'Perfect'},{id:'cards50',ico:'📚',name:'Bookworm'},{id:'cards100',ico:'🧠',name:'Big Brain'},{id:'streak7',ico:'🔥',name:'On Fire'},{id:'level5',ico:'👑',name:'Rising Star'}];
async function chkBadges(sid){const aS=await db.collection('activity').where('studentId','==',sid).get();const acts=aS.docs.map(d=>d.data());const doc=await db.collection('students').doc(sid).get();const sD=doc.data();
  const qz=acts.filter(a=>a.type==='quiz_complete'),tc=acts.filter(a=>a.type==='practice').reduce((s,a)=>s+(a.cardsViewed||0),0);const earned=[];
  if(qz.length>=1)earned.push('first_quiz');if(qz.length>=5)earned.push('quiz5');if(qz.length>=15)earned.push('quiz15');
  if(qz.some(q=>q.score===q.total&&q.total>0))earned.push('perfect');if(tc>=50)earned.push('cards50');if(tc>=100)earned.push('cards100');
  if((sD.streak||0)>=7)earned.push('streak7');if(getLevel(sD.xp||0)>=5)earned.push('level5');
  await db.collection('students').doc(sid).update({badges:earned});return earned}

async function doLogin(role){const btn=$('lB');btn.disabled=true;btn.textContent='...';
  try{if(role==='admin'){if($('lPw').value!==ADMIN_PW){toast(t('wrongPassword'),'err');btn.disabled=false;btn.textContent=t('login');return}
    S.role='admin';S.uid='admin';S.uname='Admin';S.tab='home';await initA();return}
    const u=($('lU')||{}).value?.trim().toLowerCase(),p=$('lPw').value.trim();if(!u||!p){toast(t('fillAll'),'err');btn.disabled=false;btn.textContent=t('login');return}
    const col=role==='teacher'?'teachers':'students';const snap=await db.collection(col).where('username','==',u).get();
    if(snap.empty){toast(t('notFound'),'err');btn.disabled=false;btn.textContent=t('login');return}
    const doc=snap.docs[0],data=doc.data();if(data.password!==p){toast(t('wrongPassword'),'err');btn.disabled=false;btn.textContent=t('login');return}
    S.uid=doc.id;S.uname=data.name||data.username;S.role=role;
    if(role==='teacher'){S.tab='home';await initTP()}
    else{S.teacherId=data.teacherId;S.tab='home';S.view='home';await db.collection('students').doc(doc.id).update({lastSeen:Date.now()});await ldCats(data.teacherId);await ldCR();S.unread=await getUnrd(S.uid);R()}
  }catch(e){toast(e.message,'err');btn.disabled=false;btn.textContent=t('login')}}

function rAAtt(){let h=`<div class="topbar"><div class="h2">📋 ${t('attendance')}</div></div>
  <div class="help-tip"><span class="h-ico">💡</span><div>${t('helpAttAdmin')}</div></div>
  <div class="fld"><select class="inp" id="attMonth" onchange="loadAAtt()">`;
  for(let i=0;i<6;i++){const d=new Date();d.setMonth(d.getMonth()-i);const m=d.toISOString().substring(0,7);h+=`<option value="${m}">${d.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</option>`}
  h+=`</select></div><div class="fld"><select class="inp" id="attCR" onchange="loadAAtt()"><option value="">${t('all')} ${t('classrooms')}</option>`;
  S.classrooms.forEach(c=>{h+=`<option value="${c.id}">${c.name}</option>`});
  h+=`</select></div><div id="aAttBody"><div class="loading"><div class="loader"></div></div></div>`;
  app.innerHTML=h;setTimeout(loadAAtt,0)}
async function loadAAtt(){const el=$('aAttBody');if(!el)return;const month=$('attMonth')?.value||new Date().toISOString().substring(0,7);const crId=$('attCR')?.value||'';
  let q=db.collection('attendance').where('date','>=',month+'-01').where('date','<=',month+'-31');
  if(crId){const crT=S.teachers.filter(t=>(t.classroomIds||[]).includes(crId)).map(t=>t.id);if(crT.length)q=q.where('teacherId','in',crT.slice(0,10))}
  const snap=await q.get();const records=snap.docs.map(d=>d.data());
  if(!records.length){el.innerHTML='<div class="empty"><p>No data</p></div>';return}
  const tP=records.reduce((s,r)=>s+r.presentCount,0),tA=records.reduce((s,r)=>s+r.absentCount,0);const avg=tP+tA>0?Math.round(tP/(tP+tA)*100):0;
  let h=`<div class="score-bar"><div class="score-card"><div class="score-val" style="color:var(--saf)">${records.length}</div><div class="score-lbl">Days</div></div>
  <div class="score-card"><div class="score-val" style="color:var(--grn)">${avg}%</div><div class="score-lbl">Avg</div></div>
  <div class="score-card"><div class="score-val" style="color:var(--blu)">${tP}</div><div class="score-lbl">Present</div></div></div>`;
  // Per student
  const ss={};records.forEach(r=>{(r.records||[]).forEach(sr=>{if(!ss[sr.studentId])ss[sr.studentId]={name:sr.studentName,p:0,a:0,t:0};ss[sr.studentId].t++;if(sr.status==='present')ss[sr.studentId].p++;if(sr.status==='absent')ss[sr.studentId].a++})});
  Object.entries(ss).sort((a,b)=>(b[1].p/b[1].t)-(a[1].p/a[1].t)).forEach(([id,st])=>{const rate=st.t?Math.round(st.p/st.t*100):0;const color=rate>=80?'var(--grn)':rate>=60?'var(--warn)':'var(--red)';
    h+=`<div style="padding:10px 0;border-bottom:1px solid var(--brd)"><div class="flex justify-between items-center"><div class="h3">${st.name}</div><div style="font-weight:800;color:${color}">${rate}%</div></div>
    <div class="flex gap-8 items-center" style="margin-top:4px"><div class="att-stat-bar flex-1"><div class="att-fill" style="width:${rate}%;background:${color}"></div></div><span class="sub2">${st.p}/${st.t}</span></div></div>`});
  // Daily
  h+=`<div class="sec-title" style="margin-top:16px">📅 Daily Log</div>`;
  [...records].sort((a,b)=>b.date.localeCompare(a.date)).forEach(r=>{const ds=new Date(r.date+'T12:00:00').toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'});
    const rate=r.totalCount?Math.round(r.presentCount/r.totalCount*100):0;
    h+=`<div class="list-item"><div style="font-size:18px">${rate>=80?'🟢':rate>=60?'🟡':'🔴'}</div>
    <div class="flex-1"><div class="h3">${ds}</div><div class="sub2">✍️ ${r.signedBy||r.teacherName||''} ${r.signedAt?'@ '+r.signedAt:''} · ${r.presentCount}/${r.totalCount}${r.remark?' · 📝 '+r.remark:''}</div></div></div>`});
  el.innerHTML=h}

async function stQuiz(cid,cn){hideNav();app.innerHTML='<div class="loading"><div class="loader"></div></div>';
  const qgS=await db.collection('quizGroups').where('categoryId','==',cid).get();const groups=qgS.docs.map(d=>({id:d.id,...d.data()}));
  await ldCards(cid);if(S.cards.length<4){toast('Need 4+','err');S.tab='quiz';R();return}
  let rounds=[];for(const g of groups){const gc=g.cardIds.map(id=>S.cards.find(c=>c.id===id)).filter(Boolean);if(gc.length===4){const cor=gc[Math.floor(Math.random()*4)];rounds.push({cards:shuf(gc),cId:cor.id,aUrl:cor.audioUrl})}}
  let att=0;while(rounds.length<5&&att<50){att++;const pk=shuf(S.cards).slice(0,4);if(pk.length<4||!pk.every(c=>c.imageUrl))continue;const wa=pk.filter(c=>c.audioUrl);if(!wa.length)continue;
    const cor=wa[Math.floor(Math.random()*wa.length)];rounds.push({cards:shuf(pk),cId:cor.id,aUrl:cor.audioUrl})}
  if(!rounds.length){toast(t('noContent'),'err');S.tab='quiz';R();return}
  S.qCards=shuf(rounds);S.qIdx=0;S.qScore=0;S.qTotal=S.qCards.length;S.qStart=Date.now();S.qAns=false;S.qCat=cn;S.view='quizplay';rSQuizPlay()}

function rSQuizPlay(){if(S.qIdx>=S.qCards.length){showQR();return}const r=S.qCards[S.qIdx];
  app.innerHTML=`<div class="flex justify-between items-center mb-14"><button class="back" style="margin:0" onclick="S.view='home';S.tab='quiz';R()">✕</button>
  <div class="sub">${S.qIdx+1}/${S.qTotal}</div><div style="font-size:16px;font-weight:900;color:var(--saf)">⭐${S.qScore}</div></div>
  <div class="text-center mb-14"><div class="sub mb-8">${t('listenTap')}</div>
  <button class="audio-btn" onclick="playA('${r.aUrl}')">🔊</button></div>
  <div class="quiz-grid">${r.cards.map(c=>`<div class="quiz-opt" id="q_${c.id}" onclick="ansQ('${c.id}')"><img src="${c.imageUrl}"></div>`).join('')}</div>`}

function ansQ(cid){if(S.qAns)return;S.qAns=true;const r=S.qCards[S.qIdx],ok=cid===r.cId;
  $('q_'+cid).classList.add(ok?'ok':'no');if(!ok)$('q_'+r.cId)?.classList.add('ok');
  if(ok){S.qScore++;flash('ok')}else flash('no');playA(r.aUrl);
  const btn=document.createElement('button');btn.className='btn btn-p btn-w';btn.style.marginTop='14px';
  btn.textContent=S.qIdx<S.qTotal-1?t('next')+' →':'🎉';btn.onclick=()=>{S.qIdx++;S.qAns=false;S.qIdx>=S.qCards.length?showQR():rSQuizPlay()};app.querySelector('.quiz-grid').after(btn)}
function flash(ty){const o=document.createElement('div');o.className='flash-ov '+ty;o.innerHTML='<span>'+(ty==='ok'?'✅':'❌')+'</span>';document.body.appendChild(o);setTimeout(()=>o.remove(),500)}

async function showQR(){const tm=Math.round((Date.now()-S.qStart)/1000),pct=Math.round(S.qScore/S.qTotal*100);
  let em;if(pct>=90)em='🏆';else if(pct>=70)em='🌟';else if(pct>=50)em='💪';else em='📚';
  await recAct('quiz_complete',{categoryName:S.qCat,score:S.qScore,total:S.qTotal,timeSpent:tm});
  const xpE=S.qScore*15+(pct===100?50:0);await addXP(S.uid,xpE);await updStreak(S.uid);if(pct===100)confetti();await chkBadges(S.uid);
  app.innerHTML=`<div class="text-center" style="padding:30px 0"><div style="font-size:72px">${em}</div>
  <div style="font-size:48px;font-weight:900;color:var(--saf);margin:10px 0">${S.qScore}/${S.qTotal}</div>
  <div class="sub">${pct}% · +${xpE} XP</div></div>
  <div class="flex gap-8"><button class="btn btn-s flex-1" onclick="S.view='home';S.tab='home';R()">🏠</button>
  <button class="btn btn-p flex-1" onclick="stQuiz('${S.cards[0]?.categoryId}','${esc(S.qCat)}')">🔄</button></div>`}

// Student Badges
async function rSBadges(){hideNav();app.innerHTML='<div class="loading"><div class="loader"></div></div>';const earned=await chkBadges(S.uid);
  let h=`<button class="back" onclick="S.view='home';S.tab='home';R()">← ${t('back')}</button>
  <div class="panel"><div class="panel-title">🏅 ${t('badges')} (${earned.length}/${BADGES.length})</div>
  <div class="badge-grid">`;BADGES.forEach(b=>{h+=`<div class="badge ${earned.includes(b.id)?'earned':''}"><div class="b-ico">${b.ico}</div><div class="b-name">${b.name}</div></div>`});
  h+='</div></div>';app.innerHTML=h}

// Student Messages
async function rSMsg(){hideNav();app.innerHTML='<div class="loading"><div class="loader"></div></div>';
  await markRd(S.uid,'teacher');await markRd(S.uid,S.teacherId);await markRd(S.uid,'admin');S.unread=0;
  const m1=await getMsgs(S.uid,S.teacherId);const m2=await getMsgs(S.uid,'admin');const m3=await getMsgs(S.uid,'teacher');
  const msgs=[...m1,...m2,...m3].filter((m,i,a)=>a.findIndex(x=>x.id===m.id)===i);msgs.sort((a,b)=>a.timestamp-b.timestamp);
  let h=`<button class="back" onclick="S.view='home';S.tab='home';R()">← ${t('back')}</button><div class="panel"><div class="panel-title">💬 ${t('messages')}</div><div class="msg-list" id="mL">`;
  if(!msgs.length)h+='<div class="empty"><p>'+t('noMessages')+'</p></div>';
  else msgs.forEach(m=>{const s=m.fromId===S.uid;h+=`<div class="msg-bub ${s?'msg-sent':'msg-recv'}">${!s?'<div class="msg-name">'+m.fromName+'</div>':''}${m.text}<div class="msg-time">${fmt(m.timestamp)}</div></div>`});
  h+=`</div><div class="msg-compose"><input class="inp" id="mI" placeholder="..." onkeydown="if(event.key==='Enter')sndSM()"><button class="btn btn-p btn-sm" onclick="sndSM()">${t('send')}</button></div></div>`;
  app.innerHTML=h;const l=$('mL');if(l)l.scrollTop=l.scrollHeight}
async function sndSM(){const x=$('mI').value.trim();if(!x)return;$('mI').value='';await sendMsg(S.uid,S.uname,'student',S.teacherId,'Teacher',x);rSMsg()}

// Student Profile
async function rSProfile(){const sD=await db.collection('students').doc(S.uid).get();const sd=sD.data()||{};const xi=xpInfo(sd.xp||0);
  app.innerHTML=`<div class="topbar"><div class="h2">👤 ${t('profile')}</div></div>
  <div class="text-center mb-14"><div class="avatar av-grn" style="width:64px;height:64px;font-size:28px;border-radius:20px;margin:0 auto">${(S.uname||'S')[0]}</div>
  <div class="h2" style="margin-top:10px">${S.uname}</div><div class="sub"><span class="tag tag-pur">${getCR(sd.classroomId)}</span></div></div>
  <div class="xp-bar"><div class="xp-top"><div class="xp-level">⭐ Lv.${xi.level} ${xi.name}</div><div class="xp-pts">${sd.xp||0} XP</div></div>
  <div class="xp-track"><div class="xp-fill" style="width:${xi.progress}%"></div></div></div>
  <div class="score-bar"><div class="score-card"><div class="score-val" style="color:var(--saf)">🔥${sd.streak||0}</div><div class="score-lbl">${t('streak')}</div></div>
  <div class="score-card"><div class="score-val" style="color:var(--pur)">${(sd.badges||[]).length}</div><div class="score-lbl">${t('badges')}</div></div></div>
  <button class="btn btn-d btn-w" onclick="doLogout()">🚪 ${t('logout')}</button>`}

// ============ INIT ============
async function init(){try{await ldSet();await ldCR();await db.collection('categories').limit(1).get();
  const params=new URLSearchParams(window.location.search);const urlRole=params.get('role');
  if(urlRole&&['admin','teacher','student'].includes(urlRole)){lP(urlRole)}else{R()}
}catch(e){app.innerHTML='<div style="text-align:center;padding:60px 20px"><h2 style="color:var(--txt)">Error</h2><p style="color:var(--txt3);margin-top:8px">'+e.message+'</p></div>'}}
init();

</script>
</body>
</html>
