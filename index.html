<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B0B1A">
<title>ਪੰਜਾਬੀ ਸਿੱਖੋ</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app" id="app">
  <div class="loading">
    <div class="loader"></div>
    <p>Loading ਪੰਜਾਬੀ ਸਿੱਖੋ...</p>
    <p id="loadStatus" style="font-size:11px;color:#64748B;margin-top:8px"></p>
  </div>
</div>
<div class="bnav" id="bnav"><div class="bnav-inner" id="bnavInner"></div></div>

<script>
if(typeof firebase==='undefined'){
  document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:48px">⚠️</div><h2 style="color:#F8FAFC">Firebase not loaded</h2></div>';
}
window._loaded={};
window._onFileLoad=function(n){window._loaded[n]=true;var e=document.getElementById('loadStatus');if(e)e.textContent='Loaded: '+Object.keys(window._loaded).join(', ')};
window._onFileError=function(n){document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:48px">❌</div><h2 style="color:#F8FAFC">Failed: '+n+'</h2><p style="color:#64748B;font-size:13px">File missing: <b>'+n+'.js</b></p></div>'};
</script>

<script src="app.js" onload="_onFileLoad('app')" onerror="_onFileError('app')"></script>
<script src="admin.js" onload="_onFileLoad('admin')" onerror="_onFileError('admin')"></script>
<script src="teacher.js" onload="_onFileLoad('teacher')" onerror="_onFileError('teacher')"></script>
<script src="student.js" onload="_onFileLoad('student')" onerror="_onFileError('student')"></script>
</body>
</html>
