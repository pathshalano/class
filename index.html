function tS(ts){if(!ts)return'-';const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'Now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function fmt(ts){const d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}

function confetti(){const c=document.createElement('div');c.className='confetti-container';const cl=['#F5A623','#34C759','#FF3B5C','#5E8AFF','#9B6DFF'];
  for(let i=0;i<40;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=cl[Math.floor(Math.random()*cl.length)];p.style.animationDelay=Math.random()*2+'s';c.appendChild(p)}

// Birthday helpers
function isBirthdayToday(dob){if(!dob)return false;const today=new Date();const d=new Date(dob+'T12:00:00');return d.getMonth()===today.getMonth()&&d.getDate()===today.getDate()}
function isBirthdaySoon(dob,days=7){if(!dob)return false;const today=new Date();today.setHours(0,0,0,0);
  for(let i=1;i<=days;i++){const check=new Date(today);check.setDate(check.getDate()+i);const d=new Date(dob+'T12:00:00');if(d.getMonth()===check.getMonth()&&d.getDate()===check.getDate())return i}return false}
function fmtDob(dob){if(!dob)return'—';const d=new Date(dob+'T12:00:00');return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})}

// XP / Levels
const LEVELS=[0,50,120,200,300,450,650,900,1200,1600,2100];
function getLevel(xp){let l=0;for(let i=0;i<LEVELS.length;i++){if(xp>=LEVELS[i])l=i;else break}return l}
function getLN(l){return['Beginner','Starter','Learner','Explorer','Achiever','Scholar','Expert','Master','Legend','Champion','Guru'][l]||'Guru'}
function xpInfo(xp){const l=getLevel(xp);const n=LEVELS[l+1]||LEVELS[LEVELS.length-1];return{level:l,name:getLN(l),needed:n,progress:Math.min(100,((xp-(LEVELS[l]||0))/(n-(LEVELS[l]||0)))*100)}}
async function addXP(sid,amt){const d=await db.collection('students').doc(sid).get();const o=d.data().xp||0;const ol=getLevel(o);const n=o+amt;await db.collection('students').doc(sid).update({xp:n});if(getLevel(n)>ol)confetti();return n}
async function updStreak(sid){const d=await db.collection('students').doc(sid).get();const data=d.data();const today=new Date().toISOString().split('T')[0];
  if(data.lastPracticeDate===today)return data.streak||0;const y=new Date(Date.now()-86400000).toISOString().split('T')[0];
  const ns=data.lastPracticeDate===y?(data.streak||0)+1:1;await db.collection('students').doc(sid).update({streak:ns,lastPracticeDate:today});return ns}

function compImg(f,mx=400,q=0.7){return new Promise((res)=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>h){if(w>mx){h=h*mx/w;w=mx}}else{if(h>mx){w=w*mx/h;h=mx}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q))};img.src=e.target.result};r.readAsDataURL(f)})}
function b64(b){return new Promise((r)=>{const f=new FileReader();f.onload=()=>r(f.result);f.readAsDataURL(b)})}

const BADGES=[{id:'first_quiz',ico:'🌟',name:'First Steps'},{id:'quiz5',ico:'📖',name:'Learner'},{id:'quiz15',ico:'🏆',name:'Master'},{id:'perfect',ico:'🎯',name:'Perfect'},{id:'cards50',ico:'📚',name:'Bookworm'},{id:'cards100',ico:'🧠',name:'Big Brain'},{id:'streak7',ico:'🔥',name:'On Fire'},{id:'level5',ico:'👑',name:'Rising Star'}];
async function chkBadges(sid){const aS=await db.collection('activity').where('studentId','==',sid).get();const acts=aS.docs.map(d=>d.data());const doc=await db.collection('students').doc(sid).get();const sD=doc.data();
  const qz=acts.filter(a=>a.type==='quiz_complete'),tc=acts.filter(a=>a.type==='practice').reduce((s,a)=>s+(a.cardsViewed||0),0);const earned=[];
  if(qz.length>=1)earned.push('first_quiz');if(qz.length>=5)earned.push('quiz5');if(qz.length>=15)earned.push('quiz15');
  if(qz.some(q=>q.score===q.total&&q.total>0))earned.push('perfect');if(tc>=50)earned.push('cards50');if(tc>=100)earned.push('cards100');
  if((sD.streak||0)>=7)earned.push('streak7');if(getLevel(sD.xp||0)>=5)earned.push('level5');
  await db.collection('students').doc(sid).update({badges:earned});return earned}

async function rSM(){app.innerHTML='<div class="ls"><div class="ldr"></div></div>';
  await markRd(S.uid,'teacher');await markRd(S.uid,S.teacherId);await markRd(S.uid,'admin');S.unread=0;
  const m1=await getMsgs(S.uid,S.teacherId);const m2=await getMsgs(S.uid,'admin');const m3=await getMsgs(S.uid,'teacher');
  const msgs=[...m1,...m2,...m3].filter((m,i,a)=>a.findIndex(x=>x.id===m.id)===i);msgs.sort((a,b)=>a.timestamp-b.timestamp);
  let h=`<button class="bbtn" onclick="S.view='home';R()">${t('back')}</button><div class="pnl"><div class="pt">💬 ${t('messages')}</div><div class="ml" id="mL">`;
  if(!msgs.length)h+='<div class="ey"><p>'+t('noMessages')+'</p></div>';
  else msgs.forEach(m=>{const s=m.fromId===S.uid;h+=`<div class="mb ${s?'mb-s':'mb-r'}">${!s?'<div class="mb-n">'+m.fromName+'</div>':''}${m.text}<div class="mb-t">${fmt(m.timestamp)}</div></div>`});
  h+=`</div><div class="mc"><input class="inp" id="mI" onkeydown="if(event.key==='Enter')sndSM()"><button class="btn bp bsm" onclick="sndSM()">${t('send')}</button></div></div>`;
  app.innerHTML=h;const l=$('mL');if(l)l.scrollTop=l.scrollHeight}
async function sndSM(){const x=$('mI').value.trim();if(!x)return;$('mI').value='';await sendMsg(S.uid,S.uname,'student',S.teacherId,'Teacher',x);rSM()}

// Practice
async function stPrac(cid,cn){app.innerHTML='<div class="ls"><div class="ldr"></div></div>';await ldCards(cid);if(!S.cards.length){toast(t('noContent'),'err');S.view='home';R();return}
  S.flashCards=shuf(S.cards);S.flashIdx=0;S.flashRev=false;S.view='practice';S.pS=Date.now();S.pC=cn;S.pV=0;R()}
function rSP(){const c=S.flashCards[S.flashIdx];if(!c){S.view='home';R();return}
  let h=`<button class="bbtn" onclick="endP()">${t('back')}</button><div style="text-align:center;font-size:12px;color:var(--mut);margin-bottom:6px">${S.flashIdx+1}/${S.flashCards.length}</div>
  <div class="fc">${c.imageUrl?'<img class="fc-img" src="'+c.imageUrl+'">':'<div class="fc-img" style="display:flex;align-items:center;justify-content:center;font-size:40px">🖼</div>'}
  <div class="fc-body">`;
  if(S.flashRev){h+=`<div class="fc-g">${c.gurmukhi}</div><div class="fc-e">${c.english}</div>`;if(c.audioUrl)h+='<div style="margin-top:8px"><button class="abtn" onclick="playA(\''+c.audioUrl+'\')">🔊</button></div>'}
  else h+='<div class="fc-g fc-blur">ਅੱਖਰ</div>';h+='</div></div>';
  if(!S.flashRev)h+=`<button class="btn bp bf" onclick="S.flashRev=true;S.pV++;R()">👀 ${t('reveal')}</button>`;
  else{h+='<div style="display:flex;gap:8px">';if(S.flashIdx>0)h+=`<button class="btn bs" style="flex:1" onclick="S.flashIdx--;S.flashRev=false;R()">←</button>`;
    h+=S.flashIdx<S.flashCards.length-1?`<button class="btn bp" style="flex:1" onclick="S.flashIdx++;S.flashRev=false;R()">→</button>`:`<button class="btn bp" style="flex:1" onclick="endP()">✅</button>`;h+='</div>'}
  app.innerHTML=h}
async function endP(){const tm=Math.round((Date.now()-S.pS)/1000);await recAct('practice',{categoryName:S.pC,cardsViewed:S.pV,timeSpent:tm});
  await addXP(S.uid,S.pV*5);await updStreak(S.uid);S.view='home';await ldCats(S.teacherId);R()}

// Quiz
async function stQuiz(cid,cn){app.innerHTML='<div class="ls"><div class="ldr"></div></div>';
  const qgS=await db.collection('quizGroups').where('categoryId','==',cid).get();const groups=qgS.docs.map(d=>({id:d.id,...d.data()}));
  await ldCards(cid);if(S.cards.length<4){toast('Need 4+','err');S.view='home';R();return}
  let rounds=[];for(const g of groups){const gc=g.cardIds.map(id=>S.cards.find(c=>c.id===id)).filter(Boolean);if(gc.length===4){const cor=gc[Math.floor(Math.random()*4)];rounds.push({cards:shuf(gc),cId:cor.id,aUrl:cor.audioUrl})}}
  let att=0;while(rounds.length<5&&att<50){att++;const pk=shuf(S.cards).slice(0,4);if(pk.length<4||!pk.every(c=>c.imageUrl))continue;const wa=pk.filter(c=>c.audioUrl);if(!wa.length)continue;
    const cor=wa[Math.floor(Math.random()*wa.length)];rounds.push({cards:shuf(pk),cId:cor.id,aUrl:cor.audioUrl})}
  if(!rounds.length){toast(t('noContent'),'err');S.view='home';R();return}
  S.qCards=shuf(rounds);S.qIdx=0;S.qScore=0;S.qTotal=S.qCards.length;S.qStart=Date.now();S.qAns=false;S.qCat=cn;S.view='quiz';R()}
function rSQ(){if(S.qIdx>=S.qCards.length){showQR();return}const r=S.qCards[S.qIdx];
  app.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <button class="bbtn" style="margin:0" onclick="S.view='home';R()">✕</button><div style="font-size:11px;color:var(--mut)">${S.qIdx+1}/${S.qTotal}</div>
    <div style="font-size:15px;font-weight:800;color:var(--saf)">⭐${S.qScore}</div></div>
  <div style="text-align:center;margin-bottom:12px"><div style="font-size:12px;color:var(--mut);margin-bottom:6px">${t('listenTap')}</div>
  <button class="abtn" onclick="playA('${r.aUrl}')" style="width:56px;height:56px;font-size:24px">🔊</button></div>
  <div class="qg">${r.cards.map(c=>`<div class="qpw" id="q_${c.id}" onclick="ansQ('${c.id}')"><img src="${c.imageUrl}"></div>`).join('')}</div>`}
function ansQ(cid){if(S.qAns)return;S.qAns=true;const r=S.qCards[S.qIdx],ok=cid===r.cId;
  $('q_'+cid).classList.add(ok?'ok':'no');if(!ok)$('q_'+r.cId)?.classList.add('ok');
  if(ok){S.qScore++;flash('ok')}else flash('no');playA(r.aUrl);
  const btn=document.createElement('button');btn.className='btn bp bf';btn.style.marginTop='12px';
  btn.textContent=S.qIdx<S.qTotal-1?t('next')+' →':'🎉';btn.onclick=()=>{S.qIdx++;S.qAns=false;S.qIdx>=S.qCards.length?showQR():R()};app.querySelector('.qg').after(btn)}
function flash(ty){const o=document.createElement('div');o.className='fov fov-'+ty;o.innerHTML='<span>'+(ty==='ok'?'✅':'❌')+'</span>';document.body.appendChild(o);setTimeout(()=>o.remove(),500)}
async function showQR(){const tm=Math.round((Date.now()-S.qStart)/1000),pct=Math.round(S.qScore/S.qTotal*100);
  let em,mg;if(pct>=90){em='🏆';mg='ਬਹੁਤ ਵਧੀਆ!'}else if(pct>=70){em='🌟';mg='ਸ਼ਾਬਾਸ਼!'}else if(pct>=50){em='💪';mg=t('accuracy')}else{em='📚';mg='📚'}
  await recAct('quiz_complete',{categoryName:S.qCat,score:S.qScore,total:S.qTotal,timeSpent:tm});
  const xpE=S.qScore*15+(pct===100?50:0);await addXP(S.uid,xpE);await updStreak(S.uid);if(pct===100)confetti();await chkBadges(S.uid);
  app.innerHTML=`<div style="text-align:center;padding:30px 0"><div style="font-size:60px">${em}</div>
  <div style="font-size:40px;font-weight:800;color:var(--saf);margin:10px 0">${S.qScore}/${S.qTotal}</div>
  <div style="font-size:13px;color:var(--mut)">${pct}% · +${xpE} XP</div></div>
  <div style="display:flex;gap:8px;margin-top:16px"><button class="btn bs" style="flex:1" onclick="S.view='home';R()">🏠</button>
  <button class="btn bp" style="flex:1" onclick="stQuiz('${S.cards[0]?.categoryId}','${esc(S.qCat)}')">🔄</button></div>`}

// ============ INIT ============
async function init(){try{await ldSet();await ldCR();await db.collection('categories').limit(1).get();
  const params=new URLSearchParams(window.location.search);const urlRole=params.get('role');
  if(urlRole&&['admin','teacher','student'].includes(urlRole)){lP(urlRole)}else{R()}
}catch(e){app.innerHTML='<div class="hdr"><h1>ਪੰਜਾਬੀ ਸਿੱਖੋ</h1></div><div class="pnl" style="text-align:center"><p style="color:var(--red)">'+e.message+'</p></div>'}}
init();

</script>
